name: Deploy Static Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment token
        id: token
        run: |
          TOKEN=$(az staticwebapp secrets list --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --name "${{ vars.STATIC_WEB_APP_NAME }}" --query properties.apiKey -o tsv)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install API dependencies
        run: npm ci --prefix api

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: dist
          skip_app_build: true
          skip_api_build: false
